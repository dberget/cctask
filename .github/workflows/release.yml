name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build macOS amd64
        env:
          GOOS: darwin
          GOARCH: amd64
        run: go build -o cctask-darwin-amd64 .

      - name: Build macOS arm64
        env:
          GOOS: darwin
          GOARCH: arm64
        run: go build -o cctask-darwin-arm64 .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            cctask-darwin-amd64
            cctask-darwin-arm64
